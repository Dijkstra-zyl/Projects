<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>给老师的节日祝福</title>
    <style>
        body {
            background: linear-gradient(145deg, #f9f3e6, #ffe4e1);
            font-family: '微软雅黑', sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 30px 20px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border: 2px solid #fff;
        }
        h1 {
            font-size: 3em;
            color: #b36b7b;
            margin: 10px 0;
        }
        .teacher-name {
            font-size: 2.2em;
            color: #a55d6e;
            background: #ffd9df;
            display: inline-block;
            padding: 0 20px;
            border-radius: 50px;
            margin: 10px 0 20px;
        }
        .message {
            font-size: 1.5em;
            color: #5f4b5b;
            line-height: 1.6;
            margin: 30px 0;
            border-top: 2px dashed #ffb6c1;
            border-bottom: 2px dashed #ffb6c1;
            padding: 20px 0;
        }
        .subject-icon {
            font-size: 3em;
            margin: 10px 0;
        }
        .footer {
            font-size: 1.2em;
            color: #7a5a6b;
            margin-top: 30px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="subject-icon">🌸</div>  <!-- 可以根据科目换图标 -->
        <h1>女神节快乐</h1>
        <div class="teacher-name">老师</div>
        <div class="message">
            <!-- 这里写你的祝福语，可以结合科目特色 -->
            感谢您带我走进知识的世界！<br>
            您的每一堂课都让我收获满满～<br>
            祝您节日快乐，永远年轻！
        </div>
        <div class="footer">
            —— 您的学生<br>
            赵一龙<br>
            2026.3.8
        </div>
    </div>
</body>
</html>
